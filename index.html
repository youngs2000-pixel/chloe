   AI 설정  (가이드라인 1장: 키는 절대 여기 두지 않음)
   ───────────────────────────────────────────────
   아래 AI_ENDPOINT 에는 배포한 Cloudflare Worker 주소만 넣습니다.
   (예: "https://chloe-cat-ai.YOURNAME.workers.dev")
   Gemini API Key 는 Worker 쪽 환경변수(시크릿)에만 저장되고,
   브라우저는 절대 키를 알 수 없습니다.
   비워두면 AI 없이 기존 내장 문장으로 정상 작동합니다.
═══════════════════════════════════════════════ */
const AI_ENDPOINT = "https://cat-game-ai-proxy.youngs2000.workers.dev/"; // 비우면 기본 문장만 사용.
const AI_TIMEOUT_MS = 12000;
const AI_DAILY_CALL_CAP = 120; // 비용 안전장치: 하루 최대 호출 수

let aiEnabled = true; // 시작 화면 토글로 제어
let busy = false;     // 연타/중복 호출 방지

function endpointSet(){ return typeof AI_ENDPOINT === "string" && AI_ENDPOINT.startsWith("http"); }
function aiAvailable(){ return aiEnabled && endpointSet() && underDailyCap(); }

function todayKey(){ return "chloeAI_" + new Date().toISOString().slice(0,10); }
function underDailyCap(){
  try{ return (parseInt(localStorage.getItem(todayKey())||"0",10)) < AI_DAILY_CALL_CAP; }
  catch(e){ return true; }
}
function bumpDailyCount(){
  try{ const k=todayKey(); localStorage.setItem(k, String((parseInt(localStorage.getItem(k)||"0",10))+1)); }
  catch(e){}
}

/* AI 문장 생성: 성공 시 {text, failed:false}, 실패/비활성 시 {text:fallback, failed} */
async function aiGenerate(payload, fallbackText){
  if(!aiAvailable()) return {text:fallbackText, failed:false};
  bumpDailyCount();
  try{
    const ctrl = new AbortController();
    const timer = setTimeout(()=>ctrl.abort(), AI_TIMEOUT_MS);
    const res = await fetch(AI_ENDPOINT, {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify(payload),
      signal: ctrl.signal,
    });
    clearTimeout(timer);
    if(!res.ok){ console.warn("AI HTTP", res.status); return {text:fallbackText, failed:true}; }
    const data = await res.json();
    const t = data && data.text ? String(data.text).trim() : "";
    if(!t) return {text:fallbackText, failed:true};
    return {text:t, failed:false};
  }catch(error){
    console.warn("AI text generation failed:", error);
    return {text:fallbackText, failed:true};
  }
}

const clamp = (v,lo=0,hi=100)=>Math.max(lo,Math.min(hi,v));
const pick = arr => arr[Math.floor(Math.random()*arr.length)];
const C = s => s.replace(/\{c\}/g, gs ? gs.cname : "");
const esc = s => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const $ = id => document.getElementById(id);
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function faceKey(mood,health,sleep){
  if(health<30) return "sick";
  if(sleep>70) return "sleepy";
  if(mood>=75) return "excited";
  if(mood>=55) return "happy";
  if(mood>=35) return "normal";
  return "sad";
}

let gs = null;
function newGame(pname,cname,pkey){
  const pers = PERSONALITIES[pkey];
  gs = {
    pname, cname, pkey, pers,
    day:1, total_stars:0, day_stars:[],
    hunger:40, mood:pers.mood_start, health:80, sleep:20, affection:30,
    inv:Object.fromEntries(Object.keys(ITEMS).map(k=>[k,0])),
    event:null, fed:false, actions:0, max_actions:3, tuna_streak:0,
    todayActions:[],
  };
}
function mod(ch){
  for(const k of ["hunger","mood","health","sleep","affection"]){
    if(k in ch) gs[k]=clamp(gs[k]+ch[k]);
  }
}

}

function startGame(){
  const p = $("inpP").value.trim();

  const k = window._selPkey;
  if(!p){ alert("어린이의 이름을 입력해주세요!"); return; }
  if(!c){ alert("아기고양이의 이름을 지어주세요!"); return; }
  if(!k){ alert("고양이 성격을 골라주세요!"); return; }
  newGame(p,c,k);
  screenDayStart();
}

function rollEvent(){
  for(const ev of shuffle(EVENTS.slice(0,-1))){
    if(Math.random() < ev.chance) return ev;
  }
  return null;
}
function screenDayStart(){
  busy = false;
  gs.event = rollEvent();
  gs.fed = false; gs.actions = 0; gs.todayActions = [];

  if(ev){
    mod({mood:ev.mood, health:ev.health, sleep:ev.sleep});
    render(`

        <h3>${gs.day}일차 아침 ☀️</h3>
        <div class="event-banner"><b>오늘의 이벤트 · ${ev.name}</b>${esc(C(ev.desc))}</div>

  const btns = Object.entries(FOODS).map(([n,d])=>
    `<button onclick="doFeed('${n}')">${n}<span class="desc">${d.desc}</span></button>`
  ).join("");
  render(`${statBlock()}<div class="panel">

    <div class="btns">${btns}<button class="ghost" onclick="screenMenu()">← 돌아가기</button></div>
  </div>`);

async function doFeed(fname){
  if(busy) return; busy = true;
  const fd = FOODS[fname];
  let dh=fd.hunger, dm=fd.mood, dH=fd.health, ds=fd.sleep;
  dm += Math.floor(gs.pers.food_bonus/2);

  const sleepy = gs.sleep > 65;
  if(sleepy){ dm-=5; dH-=3; ds+=5; }

  let tummy_bad = false;
  const ev = gs.event;
  if(ev && ev.tummy && fname==="참치캔"){ dH-=20; tummy_bad=true; }
  else if(fname==="참치캔"){
    gs.tuna_streak++;
    if(gs.tuna_streak>=3) dH-=10;
    if(!tummy_bad && (Math.floor(Math.random()*100)+1) <= fd.tummy_risk){ dH-=15; tummy_bad=true; }
  } else { gs.tuna_streak=0; }

  const pool = FOOD_REACTIONS[fname] || {};
  const moody = gs.mood < 30;
  let lines;
  if(tummy_bad)            lines = pool.tummy_bad || [`${gs.cname}이(가) 음식을 먹었어요.`];
  else if(sleepy)          lines = pool.sleepy || pool.normal || [`${gs.cname}이(가) 먹었어요.`];
  else if(gs.hunger>60)    lines = pool.hungry || pool.normal || [`${gs.cname}이(가) 먹었어요.`];
  else if(moody)           lines = pool.moody || pool.normal || [`${gs.cname}이(가) 먹었어요.`];
  else if(gs.health<40)    lines = pool.sick || pool.normal || [`${gs.cname}이(가) 먹었어요.`];
  else if(gs.mood>65)      lines = pool.happy || pool.normal || [`${gs.cname}이(가) 먹었어요.`];
  else                     lines = pool.normal || [`${gs.cname}이(가) 먹었어요.`];
  const fallback = C(pick(lines));

  // AI 페이로드 (수치 변경 전 상태 + 결과 변화)
  const payload = Object.assign(basePayload(), {
    type:"food_reaction", selectedFood:fname,
    resultChanges:{hunger:dh, mood:dm, health:dH, sleep:ds},
    tummyUpset: tummy_bad,
  });

  // 규칙 적용 (항상 JS가 계산)
  mod({hunger:dh, mood:dm, health:dH, sleep:ds, affection:3});
  gs.fed = true; gs.actions++;
  gs.todayActions.push(`${fname}을(를) 줌`);

  const ch=[];
  if(dh<0) ch.push(["배고픔 -"+Math.abs(dh),false]);
  if(dm>0) ch.push(["기분 +"+dm,false]); else if(dm<0) ch.push(["기분 -"+Math.abs(dm),true]);
  if(dH>0) ch.push(["건강 +"+dH,false]); else if(dH<0) ch.push(["건강 -"+Math.abs(dH),true]);
  if(ds>0) ch.push(["졸림 +"+ds,true]);

  renderThinking(`${gs.cname}이(가) 어떻게 반응할지 생각하는 중이에요`);
  const r = await aiGenerate(payload, fallback);
  showReaction(r.text, ch, r.failed);
}

// ───────────────────────────────────────────────
// 아이템 사용
// ───────────────────────────────────────────────
function screenItem(){
  if(busy) return;
  const avail = Object.entries(gs.inv).filter(([,v])=>v>0);
  if(avail.length===0){
    render(`${statBlock()}<div class="panel">
      <div class="toast">아이템이 없어요! 밤에 별점 상점에서 구매할 수 있어요. 🛒</div>
      <div class="btns"><button class="ghost" onclick="screenMenu()">← 돌아가기</button></div></div>`);
    return;
  }
  const btns = avail.map(([n,c])=>
    `<button onclick="doItem('${n}')">${n} <span class="desc">남은 수량 ${c}개 · ${ITEMS[n].desc}</span></button>`
  ).join("");
  render(`${statBlock()}<div class="panel">
    <h3>어떤 아이템을 사용할까요? 🎁</h3>
    <div class="btns">${btns}<button class="ghost" onclick="screenMenu()">← 사용하지 않기</button></div>
  </div>`);
}
async function doItem(iname){
  if(busy) return; busy = true;
  const idata = ITEMS[iname];
  let fallback, changes, resultChanges, situation = null;

  if(idata.type==="play" && gs.sleep>65){
    // 졸릴 때 놀이 패널티
    resultChanges = {sleep:10, mood:-5};
    mod(resultChanges); gs.inv[iname]--; gs.actions++;
    fallback = `${gs.cname}이(가) 너무 졸려서 제대로 놀지 못했어요.`;
    changes = [["기분 -5",true],["졸림 +10",true]];
    situation = "고양이가 너무 졸려서 장난감에 집중하지 못함";
  } else if(gs.event && gs.event.toy_bored && idata.type==="play" && (iname==="깃털 장난감"||iname==="작은 공")){
    // 장난감 싫증 이벤트
    resultChanges = {mood:5};
    mod(resultChanges); gs.inv[iname]--; gs.actions++;
    fallback = `오늘은 ${gs.cname}이(가) 이 장난감에 별 관심이 없어 보여요.`;
    changes = [["기분 +5",false]];
    situation = "오늘은 이 장난감에 싫증이 나서 시큰둥함";
  } else {
    // 일반 사용 (놀이 아이템은 성격 play_bonus 반영)
    const moodGain = idata.mood + (idata.type==="play" ? gs.pers.play_bonus : 0);
    resultChanges = {hunger:idata.hunger, mood:moodGain, health:idata.health, sleep:idata.sleep, affection:5};
    mod(resultChanges); gs.inv[iname]--; gs.actions++;
    fallback = C(pick(ITEM_REACTIONS[iname] || [`${gs.cname}이(가) 아이템을 사용했어요.`]));
    changes = [];
    if(moodGain>0) changes.push(["기분 +"+moodGain,false]);
    if(idata.health>0) changes.push(["건강 +"+idata.health,false]);
    if(idata.sleep<0) changes.push(["졸림 -"+Math.abs(idata.sleep),false]);
    if(idata.sleep>0) changes.push(["졸림 +"+idata.sleep,true]);
  }
  gs.todayActions.push(`${iname}을(를) 사용함`);

  const payload = Object.assign(basePayload(), {
    type:"item_reaction", selectedItem:iname, itemType:idata.type,
    resultChanges, situation,
  });

  renderThinking(`${gs.cname}이(가) 어떻게 반응할지 생각하는 중이에요`);
  const r = await aiGenerate(payload, fallback);
  showReaction(r.text, changes, r.failed);
}

// ───────────────────────────────────────────────
// 쓰다듬기 (AI 없이 즉시 — 비용 절약, 빠른 반응)
// ───────────────────────────────────────────────
function doPet(){
  if(busy) return;
  let lines, dm;
  if(gs.mood>=30){
    lines=[
      `${gs.cname}이(가) 쓰다듬는 손에 얼굴을 비볐어요!`,
      `${gs.cname}이(가) '그르릉...' 소리를 내며 눈을 가늘게 떴어요.`,
      `등을 쓰다듬자 ${gs.cname}이(가) 꼬리를 세웠어요.`,
      `${gs.cname}이(가) 쓰다듬는 손을 핥았어요! 간질간질해요.`,
    ]; dm=10;
  } else {
    lines=[
      `오늘은 기분이 안 좋은지 ${gs.cname}이(가) 슬쩍 피했어요.`,
      `${gs.cname}이(가) 손을 가만히 바라보다가 고개를 돌렸어요.`,
    ]; dm=3;
  }
  mod({mood:dm, affection:8});
  gs.actions++;
  gs.todayActions.push("쓰다듬어줌");
  showReaction(pick(lines), [["기분 +"+dm,false],["친밀도 +8",false]], false);
}

// ───────────────────────────────────────────────
// 반응 표시 → 메뉴 복귀
// ───────────────────────────────────────────────
function showReaction(text, changes, aiFailed){
  busy = false;
  const aiTag = (aiEnabled && endpointSet() && !aiFailed) ? `<span class="ai-tag">✨ AI 이야기</span><br>` : "";
  const chips = (changes||[]).map(([t,bad])=>`<span class="chip${bad?' bad':''}">${esc(t)}</span>`).join("");
  const note = aiFailed ? `<div class="ai-note">오늘은 기본 이야기로 들려줄게요!</div>` : "";
  render(`${statBlock()}<div class="panel">
    ${aiTag}<div class="react">💬 ${esc(text)}</div>
    ${chips?`<div class="changes">${chips}</div>`:""}
    ${note}
    <div class="btns"><button class="primary" onclick="screenMenu()">계속하기</button></div>
  </div>`);
}

// ───────────────────────────────────────────────
// 하루 평가
// ───────────────────────────────────────────────
function calcStars(){
  let s=0;
  if(gs.hunger<30) s+=2; else if(gs.hunger<50) s+=1; else if(gs.hunger>70) s-=2;
  if(gs.mood>=65) s+=2; else if(gs.mood>=45) s+=1; else if(gs.mood<25) s-=2; else s-=1;
  if(gs.health>=70) s+=2; else if(gs.health>=50) s+=1; else if(gs.health<30) s-=3; else s-=1;
  if(gs.sleep<40) s+=1; else if(gs.sleep>75) s-=1;
  if(gs.affection>=60) s+=1;
  if(!gs.fed) s-=3;
  if(s>=7) return 5; if(s>=5) return 4; if(s>=3) return 3; if(s>=1) return 2; return 1;
}
async function dayEnd(){
  if(busy) return; busy = true;
  const earned = calcStars();
  gs.total_stars += earned;
  gs.day_stars.push(earned);
  const fallback = C(pick(OWNER_LINES[earned] || OWNER_LINES[3]));

  const payload = Object.assign(basePayload(), {
    type:"owner_review", earnedStars:earned, todayEvent: gs.event ? gs.event.name : null,
    todayActionsSummary: gs.todayActions.slice(),
  });

  renderThinking("고양이 주인이 오늘의 모습을 떠올리는 중이에요");
  const r = await aiGenerate(payload, fallback);
  showOwnerReview(earned, r.text, r.failed);
}
function showOwnerReview(earned, comment, aiFailed){
  busy = false;
  const aiTag = (aiEnabled && endpointSet() && !aiFailed) ? `<span class="ai-tag">✨ AI 주인 평가</span><br>` : "";
  const note = aiFailed ? `<div class="ai-note">오늘은 기본 이야기로 들려줄게요!</div>` : "";
  render(`${statBlock()}<div class="panel">
    <h3>${gs.day}일차 마무리 · 주인 방문 🌙</h3>
    <div class="toast">밤이 되었어요. ${esc(gs.cname)}의 주인이 찾아왔어요...</div>
    ${aiTag}<div class="react">💬 ${esc(comment)}</div>
    ${note}
    <div class="center" style="margin:10px 0;font-size:22px;">
      ${"★".repeat(earned)}${"☆".repeat(5-earned)}
      <div class="meter">오늘의 평가 ${earned}점 · 누적 별점 ${gs.total_stars}개 ⭐</div>
    </div>
    <div class="btns"><button class="primary" onclick="goDiary(${earned})">계속</button></div>
  </div>`);
}

// ───────────────────────────────────────────────
// 오늘의 고양이 일기 (신규 · AI 켜졌을 때만)
// ───────────────────────────────────────────────
function fallbackDiary(){
  const ev = gs.event ? gs.event.name : "평범한 하루";
  return `오늘은 '${ev}'였어. ${gs.pname}가 나를 돌봐줘서 고마웠어. 내일도 잘 부탁해. 냐아~`;
}
async function goDiary(earned){
  if(busy) return;
  if(!aiAvailable()){ screenShopPrompt(); return; }
  busy = true;
  const payload = Object.assign(basePayload(), {
    type:"cat_diary", earnedStars:earned, todayEvent: gs.event ? gs.event.name : null,
    todayActionsSummary: gs.todayActions.slice(),
  });
  renderThinking("오늘의 고양이 일기를 쓰는 중이에요");
  const r = await aiGenerate(payload, fallbackDiary());
  busy = false;
  render(`${statBlock()}<div class="panel">
    <div class="diary"><h4>📖 오늘의 ${esc(gs.cname)} 일기</h4>${esc(r.text)}</div>
    <div class="btns"><button class="primary" onclick="screenShopPrompt()">계속</button></div>
  </div>`);
}

// ───────────────────────────────────────────────
// 상점
// ───────────────────────────────────────────────
function screenShopPrompt(){
  busy = false;
  render(`${statBlock()}<div class="panel">
    <h3>별점 상점 🛒</h3>
    <div class="toast">하루가 끝났어요! 현재 별점: ${gs.total_stars}개 ⭐<br>상점에 들러 아이템을 살 수 있어요.</div>
    <div class="btns">
      <button class="primary" onclick="screenShop()">상점에 간다</button>
      <button class="ghost" onclick="nextDay()">다음 날로 넘어간다</button>
    </div></div>`);
}
function screenShop(){
  const items = Object.entries(ITEMS).map(([n,d])=>{
    const owned = gs.inv[n];
    const canBuy = gs.total_stars>=d.cost && owned<d.max;
    const why = owned>=d.max ? `최대 ${d.max}개` : (gs.total_stars<d.cost ? `별 ${d.cost}개 필요` : `별 ${d.cost}개`);
    return `<button ${canBuy?"":"disabled"} onclick="buy('${n}')">
      ${n} <span class="desc">${why} · 보유 ${owned}개 · ${d.desc}</span></button>`;
  }).join("");
  render(`${statBlock()}<div class="panel">
    <h3>★ 별점 상점 ★</h3>
    <div class="meter">보유 별점: ${gs.total_stars}개 ⭐</div>
    <div class="btns" style="margin-top:10px;">${items}
      <button class="primary" onclick="nextDay()">상점 나가기 →</button></div>
  </div>`);
}
function buy(iname){
  const d = ITEMS[iname];
  if(gs.total_stars>=d.cost && gs.inv[iname]<d.max){
    gs.total_stars -= d.cost;
    gs.inv[iname]++;
  }
  screenShop();
}

// ───────────────────────────────────────────────
// 하룻밤 지나기 / 다음 날
// ───────────────────────────────────────────────
function overnight(){
  mod({
    hunger:20,
    sleep:-30,
    mood: gs.sleep<60 ? 5 : -5,
    health: gs.health<90 ? 5 : 0,
    affection:2,
  });
  gs.fed=false; gs.actions=0; gs.event=null; gs.todayActions=[];
}
function nextDay(){
  if(gs.day>=7){ screenEnding(); return; }
  overnight();
  gs.day++;
  screenDayStart();
}

// ───────────────────────────────────────────────
// 엔딩
// ───────────────────────────────────────────────
function endingInfo(){
  const total = gs.day_stars.reduce((a,b)=>a+b,0);
  const avg = total / gs.day_stars.length;
  if(avg>=4.0 && gs.health>=60 && gs.mood>=55){
    return {type:"최고의 집사 엔딩", emoji:"🏆😻", tag:"★★★", avg,
      lines:[
        `${gs.cname}은(는) 주인을 보자 반갑게 울었지만, 곧 ${gs.pname}의 다리에도 얼굴을 비볐어요.`,
        `주인이 환하게 웃으며 말했어요. "정말 고마워요. ${gs.cname}이(가) 전보다 더 건강하고 행복해 보여요. ${gs.pname}, 당신은 최고의 임시 집사예요!"`,
        `${gs.cname}이(가) 마지막으로 '냐아~' 하고 울었어요. 행복한 작별이에요.`,
      ]};
  } else if(avg>=2.5 || gs.health>=45){
    return {type:"괜찮은 집사 엔딩", emoji:"😺💕", tag:"★★", avg,
      lines:[
        `주인이 ${gs.cname}의 상태를 살펴보고 고개를 끄덕였어요. "조금 서툰 날도 있었지만, 정성껏 돌봐준 게 느껴져요. ${gs.pname}, 수고했어요."`,
        `${gs.cname}은(는) 작은 소리로 울며 ${gs.pname}을(를) 바라보았어요. 다음엔 더 잘할 수 있을 것 같아요!`,
      ]};
  }
  return {type:"아쉬운 집사 엔딩", emoji:"😿", tag:"", avg,
    lines:[
      `주인이 걱정스러운 얼굴로 ${gs.cname}을(를) 꼭 안았어요. "아기고양이를 돌보는 건 생각보다 세심한 일이에요. 다음에는 ${gs.cname}의 상태를 더 잘 살펴주세요."`,
      `${gs.cname}은(는) 피곤한 듯 주인의 품에 가만히 안겨 있었어요. 다음엔 더 잘할 수 있어요. 힘내요, ${gs.pname}!`,
    ]};
}
async function screenEnding(){
  if(busy) return; busy = true;
  const info = endingInfo();
  const fallback = info.lines.join("\n\n");
  const payload = Object.assign(basePayload(), {
    type:"ending_letter", endingType:info.type,
    totalStars:gs.total_stars, averageStars:Number(info.avg.toFixed(2)),
    finalStats:{hunger:gs.hunger, mood:gs.mood, health:gs.health, sleep:gs.sleep, affection:gs.affection},
    dayStars:gs.day_stars.slice(),
  });

  renderThinking("마지막으로 너에게 보낼 편지를 쓰는 중이에요");
  const r = await aiGenerate(payload, fallback);
  busy = false;

  const record = gs.day_stars.map((s,i)=>`${i+1}일차 ${"★".repeat(s)}${"☆".repeat(5-s)}`).join("<br>");
  const aiTag = (aiEnabled && endpointSet() && !r.failed) ? `<div class="center"><span class="ai-tag">✨ AI 엔딩 편지</span></div>` : "";
  const note = r.failed ? `<div class="ai-note center">오늘은 기본 편지로 마무리할게요!</div>` : "";
  render(`
    <div class="ending">
      <div class="cat-stage"><div class="cat-emoji" style="font-size:54px;">${info.emoji}</div></div>
      <div class="ending-title">${info.type} ${info.tag}</div>
      ${aiTag}
      <div class="letter">${esc(r.text)}</div>
      ${note}
      <div class="day-record">${record}<br><br>
        총 별점 <b>${gs.total_stars}개</b> ⭐ · 하루 평균 <b>${info.avg.toFixed(1)}점</b><br>
        ${esc(gs.cname)}의 최종 상태 — 건강 ${gs.health} / 기분 ${gs.mood}</div>
      <div class="btns"><button class="primary" onclick="screenIntro()">다시 돌보기 🐾</button></div>
    </div>
  `);
}

// 시작
screenIntro();
</script>
</body>
</html>
